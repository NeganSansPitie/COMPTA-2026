<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Negan</title>

<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:white;}
h1{text-align:center;padding:15px;}
.container{padding:10px;}
.card{background:#1e293b;padding:15px;border-radius:15px;margin-bottom:15px;}
h3{color:#38bdf8;margin-top:15px;}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.row label{flex:1;}
.row input{width:120px;}
input{padding:10px;margin:6px 0;border-radius:10px;border:none;}
.total{color:#22c55e;font-size:18px;}
.negative{color:red;}
.alert{background:red;padding:10px;border-radius:10px;text-align:center;display:none;}
</style>
</head>

<body>

<h1>💰 Budget Negan</h1>

<div class="container">

<div id="alert" class="alert">⚠️ Budget négatif</div>

<!-- REVENUS -->
<div class="card">
<h2>💵 Revenus</h2>
<div class="row"><label>Negan</label><input type="number" id="negan"></div>
<div class="row"><label>Lucille</label><input type="number" id="lucille"></div>
<div class="row"><label>Bonus</label><input type="number" id="bonus"></div>
</div>

<!-- CRELAN -->
<div class="card">
<h2>🏦 CRELAN</h2>

<div class="row"><label>Prêt maison</label><input class="crelan" type="number" value="561.79"></div>
<div class="row"><label>Prêt travaux 1</label><input class="crelan" type="number" value="283.26"></div>
<div class="row"><label>Prêt travaux 2</label><input class="crelan" type="number" value="326.41"></div>
<div class="row"><label>Eau</label><input class="crelan" type="number" value="63.33"></div>
<div class="row"><label>Gaz / Électricité</label><input class="crelan" type="number" value="231.99"></div>
<div class="row"><label>FGTB</label><input class="crelan" type="number" value="17.70"></div>
<div class="row"><label>Partenamut</label><input class="crelan" type="number" value="38.21"></div>
<div class="row"><label>Assurance groupe</label><input class="crelan" type="number" value="120.63"></div>
<div class="row"><label>Garage</label><input class="crelan" type="number" value="100"></div>
<div class="row"><label>Proximus</label><input class="crelan" type="number" value="55"></div>
<div class="row"><label>Base</label><input class="crelan" type="number" value="27.30"></div>
<div class="row"><label>VOO</label><input class="crelan" type="number" value="72"></div>
<div class="row"><label>Média</label><input class="crelan" type="number" value="30"></div>

<p id="totalCrelan" class="total"></p>

</div>

<!-- AUTRES -->
<div class="card">
<h2>📦 Autres charges</h2>

<div class="row"><label>Prêt voiture</label><input class="autres" type="number" value="273.85"></div>
<div class="row"><label>Part contributives</label><input class="autres" type="number" value="558.54"></div>
<div class="row"><label>Avocat</label><input class="autres" type="number"></div>
<div class="row"><label>VISA</label><input class="autres" type="number"></div>
<div class="row"><label>Courses</label><input class="autres" type="number"></div>
<div class="row"><label>Essence</label><input class="autres" type="number"></div>

<p id="totalAutres" class="total"></p>

</div>

<!-- LUCILLE -->
<div class="card">
<h2>👩 Lucille</h2>

<div class="row"><label>Lunettes</label><input class="lucilleC" type="number" value="48"></div>
<div class="row"><label>Apple</label><input class="lucilleC" type="number" value="2.99"></div>
<div class="row"><label>Proximus</label><input class="lucilleC" type="number" value="79.98"></div>

<p id="totalLucille" class="total"></p>

</div>

<!-- REVOLUT -->
<div class="card">
<h2>🏦 REVOLUT</h2>

<div class="row"><label>Taxe voiture</label><input class="revolut" type="number" value="50"></div>
<div class="row"><label>Entretien mobilité</label><input class="revolut" type="number" value="125"></div>
<div class="row"><label>Frais extra scolaire</label><input class="revolut" type="number" value="125"></div>

<p id="totalRevolut" class="total"></p>

</div>

<!-- RESULTATS -->
<div class="card">
<h2>📊 Résultat</h2>
<p id="revenus"></p>
<p id="charges"></p>
<p id="reste"></p>
</div>

</div>

<script>

// recalcul live
document.querySelectorAll("input").forEach(i=>{
    i.addEventListener("input", calcul);
});

// fonction somme fiable
function somme(classe){
    let total=0;
    document.querySelectorAll("."+classe).forEach(i=>{
        let val=parseFloat(i.value);
        total += isNaN(val) ? 0 : val;
    });
    return total;
}

function calcul(){

let revenusVal =
(parseFloat(negan.value)||0)+
(parseFloat(lucille.value)||0)+
(parseFloat(bonus.value)||0);

let crelan=somme("crelan");
let autres=somme("autres");
let lucilleT=somme("lucilleC");
let revolut=somme("revolut");

// affichage sous totaux
totalCrelan.innerText="Total CRELAN : "+crelan.toFixed(2)+" €";
totalAutres.innerText="Total Autres : "+autres.toFixed(2)+" €";
totalLucille.innerText="Total Lucille : "+lucilleT.toFixed(2)+" €";
totalRevolut.innerText="Total Revolut : "+revolut.toFixed(2)+" €";

// total global
let chargesVal = crelan + autres + lucilleT + revolut;

let reste = revenusVal - chargesVal;

// affichage
revenus.innerText="Revenus : "+revenusVal.toFixed(2)+" €";
charges.innerText="Charges : "+chargesVal.toFixed(2)+" €";

resteEl = document.getElementById("reste");
resteEl.innerText="Reste : "+reste.toFixed(2)+" €";
resteEl.className = reste < 0 ? "negative" : "total";

alert.style.display = reste < 0 ? "block" : "none";

saveData();
}

// SAVE
function saveData(){
let d=[];
document.querySelectorAll("input").forEach(i=>d.push(i.value));
localStorage.setItem("budgetNegan",JSON.stringify(d));
}

// LOAD
function loadData(){
let d=JSON.parse(localStorage.getItem("budgetNegan"));
if(d){
document.querySelectorAll("input").forEach((i,x)=>i.value=d[x]);
}
calcul();
}

loadData();

</script>

</body>
</html>
